name: build-cluster-image

# Builds and publishes the GPU clustering worker image to GHCR.
# RunPod's Serverless endpoint pulls from
# ghcr.io/e5gen2/highbid-cluster:latest — repointing the endpoint at a
# specific :SHA tag from RunPod's UI gives us deterministic rollbacks.
#
# The trigger is intentionally narrow: only changes to the docker
# folder or the clustering script trigger a rebuild, since GHA minutes
# on ubuntu-latest aren't free and the rapidsai base image is ~6 GB to
# pull. Manual rebuilds via workflow_dispatch are also wired up.

on:
  push:
    branches: [main]
    paths:
      - 'docker/cluster-gpu/**'
      - 'scripts/cluster-niches.py'
      - '.github/workflows/build-cluster-image.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # required to push to ghcr.io under this org

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The image owner needs to be lower-cased — GHCR rejects mixed
      # case in repository paths. github.repository_owner is "E5GEN2"
      # for this repo, so we lower it explicitly.
      - name: Compute image tags
        id: tags
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$OWNER/highbid-cluster" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/cluster-gpu/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:latest
            ${{ steps.tags.outputs.image }}:${{ github.sha }}
          # Cache between runs to keep build under ~3 min after first
          # run. inline cache is the cheapest option that doesn't
          # require a separate cache backend.
          cache-from: type=registry,ref=${{ steps.tags.outputs.image }}:buildcache
          cache-to:   type=registry,ref=${{ steps.tags.outputs.image }}:buildcache,mode=max

      - name: Summary
        run: |
          echo "## Image published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.tags.outputs.image }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.tags.outputs.image }}:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Point the RunPod Serverless endpoint at the \`:latest\` tag — RunPod auto-pulls on next worker start." >> "$GITHUB_STEP_SUMMARY"
